<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi Yashika!</title>
    <style>
        @font-face {
            font-family: 'GrandHotel';
            src: url('./GrandHotel-Regular.ttf') format('truetype');
        }
        :root {
            --bg-color: #ffffff;
            --text-primary: #18181b;
            --btn-bg: #f08a78;
            --btn-text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'GrandHotel', -apple-system-rounded, "SF Pro Rounded", system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h1 {
            font-size: 52px;
            font-weight: 400;
            line-height: 1.2;
        }
        p {
            font-size: 26px;
            color: #52525b;
            line-height: 1.4;
        }
        .btn {
            font-family: inherit;
            font-size: 20px;
            font-weight: 500;
            padding: 12px 32px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s ease, background-color 0.25s ease, box-shadow 0.25s ease;
            align-self: center;
        }
        .btn:hover {
            background-color: #e87763;
            box-shadow: 0 0 16px rgba(240, 138, 120, 0.35);
        }
        .btn:active {
            transform: scale(0.98);
        }
        
        /* Premium staggered fade-in animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate {
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.25s; }
        .delay-3 { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="animate delay-1">Hi Yashika! Hope you enjoyed last night!</h1>
        <p class="animate delay-2">Sri has a few questions for you, click next to answer..</p>
        <a href="survey.html" class="btn animate delay-3">Next</a>
    </div>
</body>
</html>
